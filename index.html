<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Snooker Score</title>
    <style>

        :root {
            --col-bg-main: #050908;
            --col-bg-score: #F9E431;
            --col-text-main: #eee;
            --col-text-score: var(--col-bg-main);
        }

        body {
            font-family: sans-serif;
            margin: 0;
            background-color: #019e01;
        }
        #scoreboard {
            display: flex;
            justify-content: space-between;
            margin-bottom: 3rem;
            color: var(--col-text-main);
            background-color: var(--col-bg-main);
            font-size: 1.2em;
            line-height: 1.5;
            padding: 4px 0;
        }
        .turn-marker {
            visibility: hidden;
            width: 0;
            height: 0;
            border-top: 12px solid transparent;
            border-bottom: 12px solid transparent;
            align-self: center;
        }
        #scoreboard #turn-marker-1 {
            margin-left: 6px;
            border-left: 24px solid yellow;
        }
        #scoreboard #turn-marker-2 {
            margin-right: 6px;
            border-right: 24px solid yellow;
        }
        #scoreboard.p1-strikes #turn-marker-1 {
            visibility: visible;
        }
        #scoreboard.p2-strikes #turn-marker-2 {
            visibility: visible;
        }
        #scoreboard input {
            color: var(--col-text-main);
            background-color: var(--col-bg-main);
            font-weight: bold;
        }
        .sb-player-score {
            color: var(--col-text-score);
            background-color: var(--col-bg-score);
            width: 3em;
            text-align: center;
            font-weight: bold;
            border-radius: 2px;
        }
        #p2-name {
            text-align: right;
        }
        #score-current-break {
            font-size: 1rem;
            width: 2.5em;
            text-align: center;
            align-self: center;
        }

        table {
            width: 100%;
            border-spacing: 12px;
        }

        #end-turn {
            padding: .5em 4em;
            font-size: 1.2em;
        }

        #fullscreen {
            position: fixed;
            bottom: 0;
            right: 0;
        }
        :fullscreen #fullscreen {
            display: none;
        }
    </style>
    <script>
        // Wake lock handling.

        let wakeLock = undefined;

        async function requestWakeLock() {
            try {
                wakeLock = await navigator.wakeLock.request(`screen`);

                wakeLock.addEventListener(`release`, () => {
                    wakeLock = undefined;
                });
            } catch (err) {
                console.error(`Wake lock request failed: ${err.name}, ${err.message}`);
            }
        }

        // Reacquire wake lock when tab becomes visible again
        document.addEventListener(`visibilitychange`, async () => {
            if (!wakeLock && document.visibilityState === `visible`) {
                await requestWakeLock();
            }
        });

        requestWakeLock();
    </script>
</head>
<body>

<div id="scoreboard" class="p1-strikes">
    <!-- Alternatively, "p2-strikes" -->

    <span id="turn-marker-1" class="turn-marker"></span>
    <input type="text" value="Player 1"/>
    <span id="score1" class="sb-player-score">0</span>
    <span id="score-current-break">(<span id="currentBreak">0</span>)</span>
    <span id="score2" class="sb-player-score">0</span>
    <input type="text" value="Player 2" id="p2-name"/>
    <span id="turn-marker-2" class="turn-marker"></span>
</div>

<div id="controls">

    <p>Reds remaining: <span id="redsRemaining"></span></p>

    <p>
        <button id="btn-red" data-value="1">Red (1)</button>
    </p>
    <form id="nominate-form" onsubmit="return false;">
        <table>
            <tr>
                <th>Colour</th>
                <td>
                    <button data-value="2" class="js-colorBtn">Yellow (2)</button>
                </td>
                <td>
                    <button data-value="3" class="js-colorBtn">Green (3)</button>
                </td>
                <td>
                    <button data-value="4" class="js-colorBtn">Brown (4)</button>
                </td>
                <td>
                    <button data-value="5" class="js-colorBtn">Blue (5)</button>
                </td>
                <td>
                    <button data-value="6" class="js-colorBtn">Pink (6)</button>
                </td>
                <td>
                    <button data-value="7" class="js-colorBtn">Black (7)</button>
                </td>
            </tr>
            <tr>
                <th>Nomination</th>
                <td><label>Yellow <input type="radio" name="nominate" value="2" class="js-colorRadio" disabled></label></td>
                <td><label>Green <input type="radio" name="nominate" value="3" class="js-colorRadio" disabled></label></td>
                <td><label>Brown <input type="radio" name="nominate" value="4" class="js-colorRadio" disabled></label></td>
                <td><label>Blue <input type="radio" name="nominate" value="5" class="js-colorRadio" disabled></label></td>
                <td><label>Pink <input type="radio" name="nominate" value="6" class="js-colorRadio" disabled></label></td>
                <td><label>Black <input type="radio" name="nominate" value="7" class="js-colorRadio" disabled></label></td>
            </tr>
        </table>
    </form>

    <p>
        <button id="foul-cue">Cue Ball Potted/Miss</button>
    </p>
    <p>
        <button id="end-turn">End Turn (Legal)</button>
    </p>

</div>

<button id="fullscreen">Fullscreen</button>

<script>
    document.querySelector(`#fullscreen`).addEventListener(`click`, () => {
        document.documentElement.requestFullscreen();
    });
</script>
<script>
    const game = function() {
        let _isRedOn = true;
        let _redsRemaining = 15;
        let _isEndgame = false;

        let _currentPlayer = 1;
        let _currentBreak = 0;
        const _getOtherPlayer = () => 3 - _currentPlayer;

        const _score = { 1: 0, 2: 0 };

        const Colours = Object.freeze({
            White: 0,
            Red: 1,
            Yellow: 2,
            Green: 3,
            Brown: 4,
            Blue: 5,
            Pink: 6,
            Black: 7,
        });

        let _lowestColourOnTable = Colours.Yellow;
        let _nominatedColour = 0;

        const nominateColour = colour => _nominatedColour = colour;
        const endTurn = () => {
            _score[_currentPlayer] += _currentBreak;
            _currentBreak = 0;
            _currentPlayer = _getOtherPlayer();

            _isRedOn = _redsRemaining > 0;
            _isEndgame = _redsRemaining === 0;

            if (_isEndgame) {
                nominateColour(_lowestColourOnTable);
            } else {
                _nominatedColour = 0;
            }
        };

        return {
            Colours,
            getCurrentPlayer: () => _currentPlayer,
            endTurn,
            nominateColour,
            getNominatedColour: () => _nominatedColour,
            pot,
            getRedsRemaining: () => _redsRemaining,
            scores: {
                p1: () => _score[1],
                p2: () => _score[2],
                break: () => _currentBreak,
            },
            isRedPhase: () => _isRedOn,
            isEndgame: () => _isEndgame,
        };


        function pot(value) {
            if (value === Colours.White) {
                if (_isRedOn) {
                    if (confirm("Cue ball potted or miss?")) {
                        _score[_getOtherPlayer()] += 4;
                        endTurn();
                        return true;
                    }
                } else {
                    if (_nominatedColour) {
                        if (confirm("Cue ball potted or miss?")) {
                            _score[_getOtherPlayer()] += Math.max(4, _nominatedColour);
                            endTurn();
                            return true;
                        }
                    } else {
                        alert(`Must nominate colour first.`);
                    }
                }

                return false;
            }

            if (_isRedOn) {
                if (value === Colours.Red) {
                    _currentBreak += 1;
                    _redsRemaining--;
                    _isRedOn = false;
                } else {
                    const colour = Object.entries(Colours).find(([_, val]) => val === value)[0];
                    if (!confirm(`Foul: ${colour}?`)) {
                        return false;
                    }
                    _score[_getOtherPlayer()] += Math.max(4, value);
                    endTurn();
                }
            } else {
                if (!_nominatedColour) {
                    alert(`Must nominate colour first.`);
                    return false;
                }

                if (value === _nominatedColour) {
                    _currentBreak += value;

                    if (_isEndgame) {
                        _lowestColourOnTable++;
                        nominateColour(_lowestColourOnTable);
                    } else {
                        _isEndgame = _redsRemaining === 0;

                        if (_isEndgame) {
                            nominateColour(Colours.Yellow);
                        } else {
                            _nominatedColour = 0;
                            _isRedOn = true;
                        }
                    }
                } else {
                    const [pottedCol, pottedVal] = Object.entries(Colours).find(([_, val]) => val === value);
                    if (!confirm(`Foul: ${pottedCol}?`)) {
                        return false;
                    }
                    _score[_getOtherPlayer()] += Math.max(4, _nominatedColour, pottedVal);
                    if (pottedVal === Colours.Red) {
                        _redsRemaining--;
                    }
                    endTurn();
                }
            }

            return true;
        }
    }();

    const nominateForm = document.getElementById(`nominate-form`);

    updateDisplay();


    // Ball buttons
    document.querySelectorAll('button[data-value]').forEach(btn => {
        btn.addEventListener('click', () => {
            const value = parseInt(btn.dataset.value);

            if (game.pot(value)) updateDisplay();
        });
    });

    // Colour nomination buttons
    document.querySelectorAll(`input[type=radio]`).forEach(inp => {
        inp.addEventListener(`change`, () => {
            const value = parseInt(inp.value);
            game.nominateColour(value);
            updateDisplay();
        });
    });

    // Cue ball potted/miss
    document.getElementById('foul-cue').addEventListener('click', () => {
        if (game.pot(game.Colours.White)) updateDisplay();
    });

    // End turn after legal shot
    document.getElementById('end-turn').addEventListener('click', () => {
        game.endTurn();
        updateDisplay();
    });


    function updateDisplay() {
        const isRedPhase = game.isRedPhase();
        const isEndgame = game.isEndgame();
        const nominatedColour = game.getNominatedColour();
        const mustNominateFirst = !isRedPhase && !nominatedColour;

        document.getElementById('score1').textContent = game.scores.p1();
        document.getElementById('score2').textContent = game.scores.p2();
        const currentPlayer = game.getCurrentPlayer();
        document.getElementById('scoreboard').classList.replace(`p${3 - currentPlayer}-strikes`, `p${currentPlayer}-strikes`);
        document.getElementById('currentBreak').textContent = game.scores.break();
        document.getElementById('redsRemaining').textContent = game.getRedsRemaining().toString();
        document.getElementById(`btn-red`).disabled = game.getRedsRemaining() === 0 || mustNominateFirst;
        document.getElementById(`foul-cue`).disabled = mustNominateFirst;

        if (nominatedColour) {
            nominateForm.nominate.value = nominatedColour;
        } else {
            nominateForm.nominate.forEach(inp => inp.checked = false);
        }

        document.querySelectorAll(`.js-colorRadio`).forEach(inp => {
            inp.disabled = isRedPhase || isEndgame;
        });
        document.querySelectorAll(`.js-colorBtn`).forEach(btn => {
            btn.disabled = mustNominateFirst || isEndgame && parseInt(btn.dataset.value) < nominatedColour;
        });
    }
</script>
</body>
</html>
